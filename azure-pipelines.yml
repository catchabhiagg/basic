trigger:
- main

stages:

# -----------------------------
# STAGE 1: VALIDATE + PLAN
# -----------------------------
- stage: Validate_and_Plan
  displayName: "Validate & Plan"

  jobs:
  - job: Validate
    pool:
      name: basic   # self-hosted agent pool

    steps:
    - checkout: self

    # 🔹 Install Tools (SAFE VERSION)
    - powershell: |
        Write-Host "Installing tools..."

        [Net.ServicePointManager]::SecurityProtocol = [Net.SecurityProtocolType]::Tls12

        # Install Chocolatey if not present
        if (!(Get-Command choco -ErrorAction SilentlyContinue)) {
          Set-ExecutionPolicy Bypass -Scope Process -Force
          iex ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1'))
        }

        choco install terraform -y --no-progress
        choco install python -y --no-progress
        choco install tflint -y --no-progress

        refreshenv

        python -m pip install --upgrade pip
        pip install checkov

        # tfsec
        Invoke-WebRequest -Uri "https://github.com/aquasecurity/tfsec/releases/latest/download/tfsec-windows-amd64.exe" -OutFile "$env:SystemRoot\System32\tfsec.exe"

        # trufflehog
        Invoke-WebRequest https://github.com/trufflesecurity/trufflehog/releases/latest/download/trufflehog_windows_amd64.exe -OutFile trufflehog.exe
        Move-Item trufflehog.exe "$env:SystemRoot\System32\trufflehog.exe"

        Write-Host "Tools installed successfully"
      displayName: "Install Tools"

    # 🔹 Azure Login
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'basic-appreg'
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |
          az account show

    # 🔹 Terraform Init
    - script: |
        terraform init `
        -backend-config="resource_group_name=rg-infra" `
        -backend-config="storage_account_name=infrastoragetfstate" `
        -backend-config="container_name=statefile" `
        -backend-config="key=infra/dev/terraform.tfstate"
      displayName: "Terraform Init"

    # 🔹 Lint
    - script: tflint
      displayName: "TFLint"

    # 🔹 Security
    - script: tfsec .
      displayName: "tfsec"

    - script: checkov -d .
      displayName: "Checkov"

    # 🔹 Secrets
    - script: trufflehog git file://. --only-verified
      displayName: "Trufflehog"

    # 🔹 Plan
    - script: terraform plan -out=tfplan
      displayName: "Terraform Plan"

    # 🔹 Publish artifact
    - publish: tfplan
      artifact: tfplan


# -----------------------------
# STAGE 2: APPROVAL
# -----------------------------
- stage: Approval
  displayName: "Manual Approval"
  dependsOn: Validate_and_Plan

  jobs:
  - job: WaitForApproval
    pool: server

    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: 'abhishekaggarwal.devops@gmail.com'
        instructions: 'Approve Terraform Apply'
        onTimeout: 'reject'


# -----------------------------
# STAGE 3: APPLY
# -----------------------------
- stage: Apply
  displayName: "Terraform Apply"
  dependsOn: Approval

  jobs:
  - job: ApplyJob
    pool:
      name: basic

    steps:
    - checkout: self

    # 🔹 Azure Login
    - task: AzureCLI@2
      inputs:
        azureSubscription: 'basic-appreg'
        scriptType: ps
        scriptLocation: inlineScript
        inlineScript: |
          az account show

    # 🔹 Terraform Init
    - script: |
        terraform init `
        -backend-config="resource_group_name=rg-infra" `
        -backend-config="storage_account_name=infrastoragetfstate" `
        -backend-config="container_name=statefile" `
        -backend-config="key=infra/dev/terraform.tfstate"
      displayName: "Terraform Init"

    # 🔹 Download plan
    - download: current
      artifact: tfplan

    # 🔹 Apply
    - script: terraform apply -auto-approve "$(Pipeline.Workspace)\tfplan\tfplan"
      displayName: "Terraform Apply"